services:
  - type: web
    name: panemaji
    runtime: node
    region: singapore
    plan: starter
    disk:
      name: panemaji-data
      mountPath: /data
      sizeGB: 1
    buildCommand: npm install && node scripts/download-db.mjs && npm run build
    startCommand: bash scripts/init-db.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_PATH
        value: /data/panemaji.db
